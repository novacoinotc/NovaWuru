services:
  db:
    image: postgres:16-alpine
    container_name: wuru-db
    environment:
      POSTGRES_USER: wuru
      POSTGRES_PASSWORD: wuru
      POSTGRES_DB: wuru
    ports:
      - "5432:5432"
    volumes:
      - wuru_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wuru"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  wuru_pg:
